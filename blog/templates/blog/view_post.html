{% extends "blog/base_categories_page.html" %}
{% block title %}View Post{% endblock %}
{% block content %}
  <div class="max-w-2xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">
    <h1 class="text-2xl font-bold mb-4">{{ post.title }}</h1>
    <p class="text-gray-700">{{ post.content }}</p>
    <p class="text-sm text-gray-500 mt-2">Category: {{ post.category }}</p>
    <p class="text-sm text-gray-500 mt-2">Author: {{ post.author.name }}</p>
    <p class="text-sm text-gray-500 mt-2">Posted on {{ post.created_at }}</p>
  </div>
{% endblock %}
