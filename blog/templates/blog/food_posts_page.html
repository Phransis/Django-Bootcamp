 {% extends "blog/base_categories_page.html" %}
{% block title %}Food Posts{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">
  <h1 class="text-2xl font-bold mb-4">Food Posts</h1>
  {% for post in posts %}
  <div class="mb-6 border-b pb-4">
    <h2 class="text-xl font-semibold">{{ post.title }}</h2>
    <p class="text-gray-700">{{ post.content }}</p>
    <p class="text-sm text-gray-500 mt-2">Posted on {{ post.created_at }}</p>
  </div>
  {% empty %}
  <p>No food posts available.</p>
  {% endfor %}
</div>
{% endblock %}
