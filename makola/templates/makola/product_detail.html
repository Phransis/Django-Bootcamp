{% extends "makola/base.html" %}
{% block title %}{{ object.name }} - Makola Marketplace{% endblock %}

{% block content %}
    <div class="max-w-7xl mx-auto px-6 py-8">
        <h2 class="text-2xl font-bold mb-4">{{ object.name }}</h2>
        <p class="text-lg">${{ object.price|floatformat:2 }}</p>
        <p>{{ object.description }}</p>
    </div>
{% endblock %}
