{% extends "makola/base.html" %}
{% block title %}Create Category - Makola Marketplace{% endblock %}

{% block content %}
    <div class="max-w-7xl mx-auto px-6 py-8">
        <h2 class="text-2xl font-bold mb-4">Delete Category</h2>
        <p>Are you sure you want to delete the category "{{ object.name }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="px-4 py-2 bg-red-600 text-black rounded">Yes, Delete</button>
            <a href="{% url 'makola:category-list' %}" class="px-4 py-2 bg-gray-300 text-black rounded">Cancel</a>
        </form>
    </div>
{% endblock %}
