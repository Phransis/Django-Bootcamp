{% extends "makola/base.html" %}
{% block title %}Delete Profile - Makola Marketplace{% endblock %}

{% block content %}
    <div class="max-w-7xl mx-auto px-6 py-8">
        <h2 class="text-2xl font-bold mb-4">Delete Profile</h2>
        <p>Are you sure you want to delete this profile?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="px-4 py-2 bg-red-600 text-black rounded">Delete Profile</button>
            <a href="{% url 'makola:profile-detail' object.pk %}" class="px-4 py-2 bg-gray-600 text-black rounded">Cancel</a>
        </form>
    </div>
{% endblock %}
