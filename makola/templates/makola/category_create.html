{% extends "makola/base.html" %}
{% block title %}Create Category - Makola Marketplace{% endblock %}

{% block content %}
    <div class="max-w-7xl mx-auto px-6 py-8">
        <h2 class="text-2xl font-bold mb-4">Create Category</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="px-4 py-2 bg-green-600 text-black rounded">Create Category</button>
        </form>
    </div>
{% endblock %}
