{% extends "makola/base.html" %} {% block title %}Create Profile - Makola
Marketplace{% endblock %} {% block content %}
<div class="max-w-7xl mx-auto px-6 py-8">
  <h2 class="text-2xl font-bold mb-4">Create Profile</h2>
  <form method="post">
    {% csrf_token %} {% if form.errors %}
    <div class="mb-4 text-red-600">{{ form.non_field_errors }}</div>
    {% endif %} {{ form.as_p }}
    <button type="submit" class="px-4 py-2 bg-blue-600 text-black rounded">
      Create Profile
    </button>
  </form>
</div>
{% endblock %}
