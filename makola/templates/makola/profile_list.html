{% extends "makola/base.html" %}
{% block title %}Profile List - Makola Marketplace{% endblock %}

{% block content %}
    <div class="max-w-7xl mx-auto px-6 py-8">
        <h2 class="text-2xl font-bold mb-4">Profile List</h2>
        <ul>
            {% for profile in object_list %}
                <li>
                    <a href="{% url 'makola:profile-detail' profile.pk %}">{{ profile.name }}</a>
                </li>
            {% endfor %}
        </ul>
    </div>
{% endblock %}
