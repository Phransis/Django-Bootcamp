<!doctype html>
<html>
  <head>
    <title>{{ project.name }}</title>
  </head>
  <body>
    <h1>{{ project.name }}</h1>
    <p>{{ project.description }}</p>
    <p>Start: {{ project.start_date }}</p>
    <p>End: {{ project.end_date }}</p>
    <p>Completed: {{ project.is_completed }}</p>
    <a href="{% url 'taskly:project_update' project.pk %}">Edit</a>
    <a href="{% url 'taskly:project_delete' project.pk %}">Delete</a>
    <a href="{% url 'taskly:project_list' %}">Back to List</a>
    <h2>Tasks</h2>
    <ul>
      {% for task in project.tasks.all %}
      <li>
        <a href="{% url 'taskly:task_detail' task.pk %}">{{ task.title }}</a>
      </li>
      {% endfor %}
    </ul>
    <a href="{% url 'taskly:task_create' %}">Add Task</a>
  </body>
</html>
