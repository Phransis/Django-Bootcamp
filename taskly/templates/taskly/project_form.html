<!doctype html>
<html>
  <head>
    <title>
      {% if form.instance.pk %}Edit{% else %}Create{% endif %} Project
    </title>
  </head>
  <body>
    <h1>{% if form.instance.pk %}Edit{% else %}Create{% endif %} Project</h1>
    <form method="post">
      {% csrf_token %} {{ form.as_p }}
      <button type="submit">Save</button>
    </form>
    <a href="{% url 'taskly:project_list' %}">Cancel</a>
  </body>
</html>
