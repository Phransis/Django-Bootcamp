<!doctype html>
<html>
  <head>
    <title>Delete Subtask</title>
  </head>
  <body>
    <h1>Delete Subtask</h1>
    <p>Are you sure you want to delete "{{ subtask.title }}"?</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit">Yes, Delete</button>
    </form>
    <a href="{% url 'taskly:project_list' %}">Cancel</a>
  </body>
</html>
