{% extends 'taskly/base.html' %} {% block content %}
<div class="min-h-screen bg-slate-100 py-10">
  <div class="mx-auto max-w-2xl rounded-3xl bg-white p-8 shadow-lg">
    <h1 class="text-2xl font-bold text-slate-900">
      {% if form.instance.pk %}Edit Subtask{% else %}Create Subtask{% endif %}
    </h1>
    <p class="mt-1 text-sm text-slate-500">
      Set gap-level work and link it to a parent task.
    </p>
    <form method="post" class="mt-6 space-y-5">
      {% csrf_token %} {{ form.as_p }}
      <div class="flex items-center gap-3">
        <button
          type="submit"
          class="rounded-xl bg-indigo-600 px-4 py-2 font-semibold text-white hover:bg-indigo-500"
        >
          Save Subtask
        </button>
        <a
          href="{% url 'taskly:project_list' %}"
          class="text-slate-500 hover:text-slate-700"
          >Cancel</a
        >
      </div>
    </form>
  </div>
</div>
{% endblock %}
