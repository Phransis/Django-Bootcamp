{% extends 'taskly/base.html' %} {% block content %}
<div class="min-h-screen bg-slate-100 py-10">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold text-slate-900">Projects</h1>
        <p class="text-sm text-slate-500">
          Organize your initiatives with clear timelines & active status.
        </p>
      </div>
      <a
        href="{% url 'taskly:project_create' %}"
        class="rounded-full bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-500"
        >New Project</a
      >
    </div>

    <!-- Search Form -->
    <div class="mb-6">
      <div class="flex gap-3">
        <div class="flex-1">
          <input
            type="text"
            id="search-input"
            value="{{ search_query }}"
            placeholder="Search projects by name or description..."
            class="w-full rounded-xl border border-slate-300 px-4 py-3 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20"
          />
        </div>
        <button
          id="clear-search"
          class="rounded-xl border border-slate-300 px-6 py-3 text-sm font-semibold text-slate-700 hover:bg-slate-50 transition {% if not search_query %}hidden{% endif %}"
        >
          Clear
        </button>
      </div>
      <div id="search-status" class="mt-3 text-sm text-slate-600">
        {% if search_query %} Showing results for "<strong
          >{{ search_query }}</strong
        >" {% endif %}
      </div>
    </div>

    <!-- Results Container -->
    <div id="results-container">
      {% include 'taskly/project_list_results.html' %}
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
      const searchInput = document.getElementById('search-input');
      const resultsContainer = document.getElementById('results-container');
      const searchStatus = document.getElementById('search-status');
      const clearButton = document.getElementById('clear-search');

      let searchTimeout;

      function performSearch(query) {
          // Show loading state
          resultsContainer.innerHTML = '<div class="col-span-full text-center py-8"><div class="text-slate-500">Searching...</div></div>';

          fetch(`{% url 'taskly:project_list' %}?search=${encodeURIComponent(query)}`, {
              headers: {
                  'X-Requested-With': 'XMLHttpRequest',
                  'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || ''
              }
          })
          .then(response => response.json())
          .then(data => {
              resultsContainer.innerHTML = data.html;

              // Update search status
              if (query.trim()) {
                  searchStatus.innerHTML = `Showing results for "<strong>${query}</strong>"`;
                  clearButton.classList.remove('hidden');
              } else {
                  searchStatus.innerHTML = '';
                  clearButton.classList.add('hidden');
              }

              // Update URL without page reload
              const newUrl = query.trim() ? `{% url 'taskly:project_list' %}?search=${encodeURIComponent(query)}` : '{% url 'taskly:project_list' %}';
              window.history.replaceState({}, '', newUrl);
          })
          .catch(error => {
              console.error('Search error:', error);
              resultsContainer.innerHTML = '<div class="col-span-full text-center py-8"><div class="text-red-500">Search failed. Please try again.</div></div>';
          });
      }

      // Handle input changes with debouncing
      searchInput.addEventListener('input', function() {
          const query = this.value;

          // Clear previous timeout
          clearTimeout(searchTimeout);

          // Debounce search requests (wait 300ms after user stops typing)
          searchTimeout = setTimeout(() => {
              performSearch(query);
          }, 300);
      });

      // Handle clear button
      clearButton.addEventListener('click', function() {
          searchInput.value = '';
          performSearch('');
      });

      // Handle Enter key for immediate search
      searchInput.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
              clearTimeout(searchTimeout);
              performSearch(this.value);
          }
      });
  });
</script>

{% endblock %}
